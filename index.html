<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp P2P Crypto</title>
    <style>
        :root {
            --bg-main: #0b141a; /* Оригинальный темный цвет WhatsApp */
            --panel-bg: #111b21;
            --chat-bg: #0b141a;
            --my-bubble: #005c4b;
            --peer-bubble: #202c33;
            --accent-green: #00a884;
            --text-light: #e9edef;
            --text-muted: #8696a0;
            --border-color: #222e35;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-light);
            height: 100vh; width: 100vw;
            display: flex; overflow: hidden;
        }

        /* Менеджер Контактов (Левая панель в стиле WhatsApp) */
        .side-panel {
            width: 35%; min-width: 280px; max-width: 400px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
        }

        .side-header {
            padding: 12px 16px; background: #202c33;
            display: flex; align-items: center; justify-content: space-between;
            height: 60px;
        }
        .my-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-green); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; }
        
        .add-contact-box {
            padding: 10px 14px; background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex; flex-direction: column; gap: 8px;
        }
        .p2p-input {
            width: 100%; background: #2a3942; border: none;
            padding: 8px 12px; border-radius: 8px; color: #fff;
            outline: none; font-size: 13px;
        }
        .p2p-btn {
            background: var(--accent-green); color: #fff; border: none;
            padding: 8px; border-radius: 8px; font-weight: bold;
            cursor: pointer; font-size: 12px; text-transform: uppercase;
        }

        .contacts-list { flex: 1; overflow-y: auto; }
        .contact-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; cursor: pointer;
            border-bottom: 1px solid rgba(34, 46, 53, 0.5);
            transition: background 0.2s;
        }
        .contact-item:hover, .contact-item.active { background: #2a3942; }
        .contact-avatar { width: 45px; height: 45px; border-radius: 50%; background: #687781; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .contact-info { flex: 1; }
        .contact-info h4 { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
        .contact-info p { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Окно чата (Правая панель) */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); }
        .chat-header {
            height: 60px; background: #202c33; padding: 10px 16px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }
        
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .sys-badge { align-self: center; font-size: 11px; background: #182229; padding: 5px 12px; border-radius: 8px; color: #fad964; border: 1px solid rgba(250,217,100,0.1); font-family: monospace; text-align: center; max-width: 90%; }
        
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .msg-row.peer { justify-content: flex-start; }
        .bubble { max-width: 65%; padding: 8px 12px; border-radius: 8px; font-size: 14.5px; line-height: 1.4; position: relative; color: #e9edef; }
        .msg-row.me .bubble { background: var(--my-bubble); }
        .msg-row.peer .bubble { background: var(--peer-bubble); }
        .crypto-sig { font-size: 8px; color: var(--accent-green); display: block; text-align: right; margin-top: 4px; font-family: monospace; }

        .chat-media { max-width: 100%; max-height: 200px; border-radius: 6px; margin: 4px 0; display: block; }
        .audio-player { width: 100%; margin-top: 4px; accent-color: var(--accent-green); }

        /* Нижняя панель ввода */
        .bottom-bar { height: 62px; background: #202c33; padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
        .icon-btn { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .icon-btn:active { color: #fff; }
        .chat-input { flex: 1; background: #2a3942; border: none; padding: 10px 16px; border-radius: 8px; color: #fff; outline: none; font-size: 14px; }

        /* Окно WebRTC P2P Видеовызова */
        #callScreen { display: none; position: fixed; inset: 0; z-index: 99999; background: #0b141a; padding: 20px; flex-direction: column; justify-content: space-between; align-items: center; }
        .v-grid { width: 100%; flex: 1; display: flex; flex-direction: column; gap: 12px; margin: 20px 0; justify-content: center; }
        .v-window { width: 100%; max-width: 340px; height: 210px; background: #111b21; border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); position: relative; align-self: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .hangup-btn { background: #ea0038; color: white; border: none; padding: 16px; width: 80%; max-width: 280px; border-radius: 24px; font-weight: bold; font-size: 15px; cursor: pointer; }
    </style>
</head>
<body onload="initCryptoAndP2P()">

    <!-- Полноэкранный WebRTC P2P Звонок -->
    <div id="callScreen">
        <div style="color: var(--accent-green); font-family: monospace; font-size: 12px; font-weight: bold;">🔒 DIRECT P2P CALL SESSION</div>
        <div class="v-grid">
            <div class="v-window"><video id="peerVideo" autoplay playsinline></video></div>
            <div class="v-window"><video id="myVideo" autoplay playsinline muted></video></div>
        </div>
        <button onclick="endP2PCall()" class="hangup-btn">ЗАВЕРШИТЬ ЗВОНОК</button>
    </div>

    <!-- ЛЕВАЯ ПАНЕЛЬ: Контакты (WhatsApp Style) -->
    <div class="side-panel">
        <div class="side-header">
            <div class="my-avatar">Вы</div>
            <div style="font-size: 12px; color: var(--accent-green); font-weight: bold;" id="myPeerIdDisplay">ID: Генерируется...</div>
        </div>
        
        <!-- Блок добавления нового пира в сеть -->
        <div class="add-contact-box">
            <input type="text" id="contactNameInput" placeholder="Имя контакта (например, Иван)..." class="p2p-input">
            <input type="text" id="contactTokenInput" placeholder="Вставьте P2P Токен (ID) контакта..." class="p2p-input">
            <button onclick="addP2PContact()" class="p2p-btn">Добавить контакт в P2P-сеть</button>
            <button onclick="copyMyP2PToken()" class="p2p-btn" style="background:#202c33; border:1px solid var(--border-color); color:var(--accent-green);">Скопировать мой P2P Токен</button>
        </div>

        <!-- Список контактов -->
        <div class="contacts-list" id="contactsContainer">
            <!-- Контакты будут создаваться динамически -->
        </div>
    </div>

    <!-- ПРАВАЯ ПАНЕЛЬ: Активный чат -->
    <div class="main-chat">
        <div class="chat-header">
            <div class="user-block" style="display:flex; align-items:center; gap:10px;">
                <div class="contact-avatar" id="activeChatAvatar" style="width:36px; height:36px; font-size:14px;">?</div>
                <div>
                    <h3 id="activeChatName" style="font-size:15px;">Выберите контакт</h3>
                    <p id="activeChatStatus" style="font-size:11px; color:var(--text-muted);">Нет активной P2P-сессии</p>
                </div>
            </div>
            <div class="btn-group" id="chatActionButtons" style="display: none;">
                <button onclick="startP2PCall(false)" class="icon-btn" style="color:var(--accent-green);">📞</button>
                <button onclick="startP2PCall(true)" class="icon-btn" style="color:var(--accent-green); margin-left:10px;">📹</button>
            </div>
        </div>

        <!-- Окно сообщений -->
        <div id="chatArea" class="chat-area">
            <div class="sys-badge">Добавьте контакт по его P2P-токену, чтобы установить прямое защищенное соединение без серверов.</div>
        </div>

        <!-- Панель ввода -->
        <div class="bottom-bar">
            <input type="file" id="mediaFile" accept="image/*,video/*,audio/*" style="display: none;" onchange="uploadP2PMedia()">
            <button onclick="document.getElementById('mediaFile').click()" class="icon-btn">📁</button>
            
            <input id="chatInput" type="text" placeholder="Введите сообщение..." class="chat-input" disabled>
            
            <button id="voiceBtn" onclick="handleP2PVoiceRecord()" class="icon-btn" style="color: var(--text-muted);">🎙️</button>
            <button onclick="sendP2PMessage()" class="icon-btn" style="color: var(--accent-green);">➔</button>
        </div>
    </div>

    <script>
        let myP2PToken = ""; 
        let cryptoKey = null;
        let hardwareStream = null;
        let rtcPeerConn = null;
        let mediaRec = null;
        let audioChunks = [];
        
        let contacts = {}; // Локальная база контактов в памяти телефона
        let activeContactId = null;
